openapi: 3.0.3
info:
  title: DocBox API
  version: 1.0.0
  description: REST API for DocBox document storage platform.
servers:
  - url: http://localhost:8000/api
paths:
  /auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '201':
          description: Registered
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
                device_name:
                  type: string
      responses:
        '200':
          description: Authenticated
  /documents:
    get:
      summary: List documents
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Documents list
    post:
      summary: Upload document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, file]
              properties:
                title:
                  type: string
                description:
                  type: string
                folder_id:
                  type: integer
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Created
  /documents/{id}:
    get:
      summary: Document details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Document
    delete:
      summary: Move document to trash
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Trashed
  /documents/{id}/shares:
    get:
      summary: List shares
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Shares
    post:
      summary: Share document
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, permission]
              properties:
                user_id:
                  type: integer
                permission:
                  type: string
                  enum: [view, edit, admin]
      responses:
        '200':
          description: Share updated
  /documents/{id}/restore:
    post:
      summary: Restore trashed document
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Restored
  /documents/{id}/purge:
    delete:
      summary: Permanently delete trashed document
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Purged
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
