version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: STRack-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: STRack
      MYSQL_USER: STRack
      MYSQL_PASSWORD: STRack
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: STRack-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: STRack
      PMA_PASSWORD: STRack
    depends_on:
      - mysql

volumes:
  mysql_data:
